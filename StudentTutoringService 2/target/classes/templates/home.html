<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Tutoring Service - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            color: gray;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
        }
        .btn-login {
            background-color: steelblue;
            color: white;
        }
        .btn-register {
            background-color: goldenrod;
            color: white;
        }
    </style>
</head>
<body>
<h1>Welcome to the Student Tutoring Service</h1>
<p>Find a tutor and reserve your appointment!</p>
<a href="/login" class="btn btn-login">Login</a>
<a href="/register" class="btn btn-register">Create Account</a>
</body>
</html>
