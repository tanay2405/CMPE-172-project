<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Appointments</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: steelblue;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin-left: 20px;
        }
        h1 {
            text-align: center;
            margin-top: 30px;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            box-shadow: 0 0 10px gray;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid gray;
            text-align: center;
        }
        th {
            background-color: mediumpurple;
            color: white;
        }
        .btn {
            padding: 6px 16px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .no-appointments {
            text-align: center;
            margin-top: 50px;
            color: gray;
        }
    </style>
</head>
<body>
<nav>
    <div>
        <a href="/slots">View Appointments</a>
        <a href="/myAppointments">My Appointments</a>
        <a href="/logout">Logout</a>
    </div>
</nav>
<h1>My Appointments</h1>

<div th:if="${appointments == null or #lists.isEmpty(appointments)}">
    <p class="no-appointments">You have no appointments booked yet.</p>
</div>

<table th:if="${appointments != null and not #lists.isEmpty(appointments)}">
    <tr>
        <th>Appointment ID</th>
        <th>Tutor</th>
        <th>Subject</th>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tr th:each="appointment : ${appointments}">
        <td th:text="${appointment.appointmentID}"></td>
        <td th:text="${appointment.tutorName}"></td>
        <td th:text="${appointment.subject}"></td>
        <td th:text="${appointment.startTime}"></td>
        <td th:text="${appointment.endTime}"></td>
        <td th:text="${appointment.status}"></td>
        <td>
            <form th:action="@{/cancel}" method="post">
                <input type="hidden" name="appointmentID" th:value="${appointment.appointmentID}" />
                <input type="hidden" name="slotID" th:value="${appointment.slotID}" />
                <button type="submit" class="btn">Cancel</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
